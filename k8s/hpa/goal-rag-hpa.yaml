apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: goal-rag-hpa
  namespace: marshal
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: goal-rag
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
