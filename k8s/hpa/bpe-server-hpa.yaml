apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bpe-server-hpa
  namespace: marshal
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bpe-server
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
