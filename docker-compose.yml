version: "3.9"

services:
  # PostgreSQL with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-marshal_db}
      POSTGRES_USER: ${POSTGRES_USER:-marshal_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/trial/001-bootstrap-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marshal_app} -d ${POSTGRES_DATABASE:-marshal_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama LLM (default provider)
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      OLLAMA_HOST: "0.0.0.0"
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgREST — REST API for PostgreSQL
  postgrest:
    image: postgrest/postgrest:v12.2.3
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: "postgres://${POSTGRES_USER:-marshal_app}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DATABASE:-marshal_db}"
      PGRST_DB_SCHEMAS: "api"
      PGRST_DB_ANON_ROLE: "web_anon"
      PGRST_JWT_SECRET: ${POSTGREST_JWT_SECRET:?Set POSTGREST_JWT_SECRET in .env}
      PGRST_JWT_AUD: "postgrest"
      PGRST_SERVER_PORT: "3000"
    ports:
      - "3000:3000"

  # Goal-RAG — RAG backend server
  goal-rag:
    build:
      context: .
      dockerfile: docker/Dockerfile.goal-rag
      args:
        FEATURES: "postgres"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      RUST_LOG: "info"
      RAG_HOST: "0.0.0.0"
      RAG_PORT: "8080"
      RAG_CONFIG: "/etc/marshal/config.toml"
      # Database
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-marshal_db}
      POSTGRES_USER: ${POSTGRES_USER:-marshal_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      USE_PGVECTOR: "true"
      # JWT
      POSTGREST_JWT_SECRET: ${POSTGREST_JWT_SECRET}
      # LLM
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: "http://ollama:11434"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      # Branding
      APP_NAME: ${APP_NAME:-Marshal}
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      APP_COLOR: ${APP_COLOR:-#7C83BC}
      # Trial
      TRIAL_DURATION_DAYS: ${TRIAL_DURATION_DAYS:-90}
      TRIAL_MAX_USERS: ${TRIAL_MAX_USERS:-25}
      TRIAL_MAX_STORAGE_GB: ${TRIAL_MAX_STORAGE_GB:-10}
      TRIAL_MAX_DOCUMENTS: ${TRIAL_MAX_DOCUMENTS:-200}
      SUPER_ADMIN_EMAILS: ${SUPER_ADMIN_EMAILS:-}
      # Email (optional)
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_ADDRESS: ${RESEND_FROM_ADDRESS:-}
      # reCAPTCHA (optional)
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY:-}
    ports:
      - "8080:8080"

  # BPE Server — Business Process Engine
  bpe-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.bpe-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RUST_LOG: "info"
      BPE_HOST: "0.0.0.0"
      BPE_PORT: "8090"
      BPE_PG_HOST: "postgres"
      BPE_PG_PORT: "5432"
      BPE_PG_DBNAME: ${POSTGRES_DATABASE:-marshal_db}
      BPE_PG_USER: ${POSTGRES_USER:-marshal_app}
      BPE_PG_PASSWORD: ${POSTGRES_PASSWORD}
      BPE_RAG_URL: "http://goal-rag:8080"
      POSTGREST_JWT_SECRET: ${POSTGREST_JWT_SECRET}
    ports:
      - "8090:8090"

  # Frontend — React SPA served by Caddy
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "3001:80"

  # Caddy — Reverse proxy (combines all services behind one port)
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - goal-rag
      - bpe-server
      - postgrest
      - frontend
    ports:
      - "${APP_PORT:-80}:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile.compose:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  ollama_data:
  caddy_data:
  caddy_config:
